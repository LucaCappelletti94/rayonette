# line3: coordinator -> relay1 -> relay2 -> leaf. A depth-3 cascade where each
# relay bridges one network to the next, so the leaf is two hops from the
# coordinator. relay2 is an interior bridge: killing it strands the leaf.
name: rayonette-line3

volumes:
  rayonette-topo-cache:
    external: true

networks:
  net12: {}
  net23: {}

x-agent: &agent
  init: true
  image: rayonette-harness-base:latest
  volumes:
    - ../../secrets:/secrets:ro
    - rayonette-topo-cache:/home/rayonette/.cache

services:
  relay1:
    <<: *agent
    networks: [net12]
    ports:
      - "2210:22"
  relay2:
    <<: *agent
    networks: [net12, net23]
  leaf:
    <<: *agent
    networks: [net23]
