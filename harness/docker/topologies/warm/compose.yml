# A single leaf used to warm the shared build cache once, sequentially, so every
# topology afterward provisions by cache hit. See ../lib.sh topo_warm.
name: rayonet-warm

volumes:
  rayonet-topo-cache:
    external: true

services:
  warm:
    init: true
    image: rayonet-harness-base:latest
    volumes:
      - ../../secrets:/secrets:ro
      - rayonet-topo-cache:/home/rayonet/.cache
    ports:
      - "2299:22"
