# Segmented multi-host network for rayonette's level-4 tests.
#
# The coordinator runs on the host and can only reach `bastion` (the one
# published port). Every other node is reachable solely by name through an ssh
# ProxyJump chain, so the topology forces real propagation through jump hosts:
#
#   host -> bastion                      (frontnet, published :2201)
#   host -> bastion -> leaf-a/leaf-b     (backnet)
#   host -> bastion -> relay -> leaf-deep (deepnet, 2-hop ProxyJump)
#   host -> bastion -> leaf-blocked      (blockednet, no egress)
#
# See README.md for the full rationale.

name: rayonette-harness

networks:
  frontnet: {}
  backnet: {}
  deepnet: {}
  blockednet:
    internal: true # no egress: rustup cannot fetch the toolchain here

x-agent: &agent
  init: true
  volumes:
    - ./secrets:/secrets:ro

services:
  bastion:
    <<: *agent
    image: rayonette-harness-base:latest
    build:
      context: .
      dockerfile: Dockerfile.base
    networks: [frontnet, backnet, blockednet]
    ports:
      - "2201:22"

  relay:
    <<: *agent
    image: rayonette-harness-base:latest
    networks: [backnet, deepnet]

  leaf-a:
    <<: *agent
    image: rayonette-harness-base:latest
    networks: [backnet]

  leaf-b:
    <<: *agent
    image: rayonette-harness-rust:latest
    build:
      context: .
      dockerfile: Dockerfile.rust
    networks: [backnet]

  leaf-deep:
    <<: *agent
    image: rayonette-harness-base:latest
    networks: [deepnet]

  leaf-blocked:
    <<: *agent
    image: rayonette-harness-base:latest
    networks: [blockednet]

  # A fast/slow pair (identical but for a CPU cap) for the work-share scenario:
  # the cap can only slow leaf-slow, so the unthrottled leaf-fast takes at least
  # as large a share (the scenario asserts that invariant; the cap does not
  # reliably bite a short CPU burst on a shared runner). The harness warms the
  # build cache with a cheap pass first, so the cap applies to task execution,
  # not the one-time compile.
  leaf-fast:
    <<: *agent
    image: rayonette-harness-rust:latest
    networks: [backnet]

  leaf-slow:
    <<: *agent
    image: rayonette-harness-rust:latest
    networks: [backnet]
    deploy:
      resources:
        limits:
          cpus: "0.5"
