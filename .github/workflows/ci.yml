name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Level 1 of the test pyramid (in-process), plus the lint and format gates.
  # Subprocess, ssh-localhost, and docker multi-host levels are added as their
  # phases land (see PLAN.md).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  # Coverage via cargo-llvm-cov (LLVM source-based instrumentation). llvm-cov's
  # region attribution credits async/macro code that line-based tools miss.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # 100% functions and ~100% lines are attainable; region coverage is
      # capped below 100% by generic monomorphization (per-type encode/decode
      # error arms that protocol types never exercise), not by dead code.
      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --ignore-filename-regex 'src/bin/|fixtures/' --fail-under-functions 100 --fail-under-lines 99
